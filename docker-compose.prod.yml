services:
  db:
    image: mariadb:11.4
    container_name: mt-api-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-mt_api}
      MARIADB_USER: ${DB_USER:-sa}
      MARIADB_PASSWORD: ${DB_PASS:-youpassword}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root}
      TZ: Asia/Bangkok
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${DB_EXPOSE_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mt-api-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/backups:/app/backups
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: mt-api-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  mariadb_data:
